name: Build & Test

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Compile library
        run: |
          ANDROID_JAR="$ANDROID_HOME/platforms/android-29/android.jar"
          if [ ! -f "$ANDROID_JAR" ]; then
            sdkmanager "platforms;android-29"
            ANDROID_JAR="$ANDROID_HOME/platforms/android-29/android.jar"
          fi
          mkdir -p build/classes
          javac -source 1.8 -target 1.8 \
            -bootclasspath "$ANDROID_JAR" \
            -d build/classes \
            java/io/battlewithbytes/ucb/*.java
          cd build/classes
          jar cf ../ucblib.jar io/

      - name: Run tests
        run: |
          ANDROID_JAR="$ANDROID_HOME/platforms/android-29/android.jar"
          mkdir -p build/test
          javac -source 1.8 -target 1.8 \
            -bootclasspath "$ANDROID_JAR" \
            -classpath build/ucblib.jar \
            -d build/test \
            test/UcbFrameTest.java
          java -classpath "build/ucblib.jar:build/test" UcbFrameTest

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ucblib
          path: build/ucblib.jar

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build JAR
        run: |
          ANDROID_JAR="$ANDROID_HOME/platforms/android-29/android.jar"
          if [ ! -f "$ANDROID_JAR" ]; then
            sdkmanager "platforms;android-29"
          fi
          mkdir -p build/classes
          javac -source 1.8 -target 1.8 \
            -bootclasspath "$ANDROID_JAR" \
            -d build/classes \
            java/io/battlewithbytes/ucb/*.java
          cd build/classes
          jar cf ../ucblib.jar io/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/ucblib.jar
          generate_release_notes: true
